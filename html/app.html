<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carly's Tic Tac Toe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fdf6f0;
            text-align: center;
            margin: 20px;
            padding: 20px;
            border: 4px solid #b0d3f6;
        }

        h1 {
            color: #87bef5;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 8px;
            justify-content: center;
            margin: 20px auto;
        }

        .cell {
            background-color: white;
            border: 2px solid #b0d3f6;
            font-size: 40px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            height: 100px;
            width: 100px;
        }

        .cell:hover {
            background-color: #f0e6ff;
        }

        #status {
            font-size: 20px;
            margin-top: 15px;
            color: #333333;
        }

        button {
            margin: 10px 5px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #87bef5;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #004080;
        }

        .back-link {
            display: block;
            margin-top: 20px;
            font-weight: bold;
            color: #002E5D;
            text-decoration: none;
        }

        .back-link:hover {
            color: #cc6600;
        }

        .copyright {
            font-size: 15px;
            font-style: italic;
            color: #999999;
            text-align: center;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <h1>Tic Tac Toe</h1>
    <p>Choose one-player or two-player mode and start playing.</p>

    <div>
        <button onclick="setMode('one')">One Player</button>
        <button onclick="setMode('two')">Two Player</button>
    </div>

    <div id="status">Choose a game mode to begin.</div>

    <div id="board">
        <div class="cell" onclick="makeMove(0)"></div>
        <div class="cell" onclick="makeMove(1)"></div>
        <div class="cell" onclick="makeMove(2)"></div>
        <div class="cell" onclick="makeMove(3)"></div>
        <div class="cell" onclick="makeMove(4)"></div>
        <div class="cell" onclick="makeMove(5)"></div>
        <div class="cell" onclick="makeMove(6)"></div>
        <div class="cell" onclick="makeMove(7)"></div>
        <div class="cell" onclick="makeMove(8)"></div>
    </div>

    <button onclick="resetGame()">Restart Game</button>

    <a href="../index.html" class="back-link">Back to Memories Page</a>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let gameOver = false;
        let gameMode = "";

        function setMode(mode) {
            gameMode = mode;
            resetGame();

            if (gameMode === "one") {
                document.getElementById("status").innerText = "One Player Mode: Your turn (X)";
            } else {
                document.getElementById("status").innerText = "Two Player Mode: Player X's turn";
            }
        }

        function makeMove(index) {
            if (board[index] !== "" || gameOver || gameMode === "") {
                return;
            }

            board[index] = currentPlayer;
            document.getElementsByClassName("cell")[index].innerText = currentPlayer;

            if (checkWinner()) {
    document.getElementById("status").innerText = "Player " + currentPlayer + " wins!";
    launchConfetti();   // 🎉 ADD THIS LINE
    gameOver = true;
    return;
}

            if (!board.includes("")) {
                document.getElementById("status").innerText = "It's a tie!";
                gameOver = true;
                return;
            }

            if (gameMode === "two") {
                currentPlayer = currentPlayer === "X" ? "O" : "X";
                document.getElementById("status").innerText = "Player " + currentPlayer + "'s turn";
            } else if (gameMode === "one") {
                currentPlayer = "O";
                document.getElementById("status").innerText = "Computer's turn...";
                setTimeout(computerMove, 500);
            }
        }

        function computerMove() {
            if (gameOver) {
                return;
            }

            let emptySpots = [];
            for (let i = 0; i < board.length; i++) {
                if (board[i] === "") {
                    emptySpots.push(i);
                }
            }

            if (emptySpots.length === 0) {
                return;
            }

            let randomIndex = Math.floor(Math.random() * emptySpots.length);
            let move = emptySpots[randomIndex];

            board[move] = "O";
            document.getElementsByClassName("cell")[move].innerText = "O";

            if (checkWinner()) {
                document.getElementById("status").innerText = "Computer wins!";
                gameOver = true;
                return;
            }

            if (!board.includes("")) {
                document.getElementById("status").innerText = "It's a tie!";
                gameOver = true;
                return;
            }

            currentPlayer = "X";
            document.getElementById("status").innerText = "Your turn (X)";
        }

        function checkWinner() {
            const winningCombos = [
                [0, 1, 2],
                [3, 4, 5],
                [6, 7, 8],
                [0, 3, 6],
                [1, 4, 7],
                [2, 5, 8],
                [0, 4, 8],
                [2, 4, 6]
            ];

            for (let combo of winningCombos) {
                let [a, b, c] = combo;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    return true;
                }
            }

            return false;
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            currentPlayer = "X";
            gameOver = false;

            let cells = document.getElementsByClassName("cell");
            for (let i = 0; i < cells.length; i++) {
                cells[i].innerText = "";
            }

            if (gameMode === "one") {
                document.getElementById("status").innerText = "One Player Mode: Your turn (X)";
            } else if (gameMode === "two") {
                document.getElementById("status").innerText = "Two Player Mode: Player X's turn";
            } else {
                document.getElementById("status").innerText = "Choose a game mode to begin.";
            }
        }
        function launchConfetti() {
    confetti({
        particleCount: 150,
        spread: 70,
        origin: { y: 0.6 }
    });
}
    </script>
    <br>
    <div class="copyright">Copyright &copy; Carly Belliston 2026</div>

</body>
</html>
